<!DOCTYPE html>
<html>
<head>
  <title>Login Page</title>
  <link rel="icon" type="image/png" href="/static/logo1.png" style="border-radius:2000px">
    <title>Colltech Careers</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-image: url("/static/bg7.jpg");
      background-size: cover;
      background-repeat: no-repeat;
    }

    .container {
      max-width: 400px;
      width: 50%
      padding: 20px;
      background-color: #f2f2f2;
      margin: 0 auto;
      margin-top: 30px;
      border: 1px solid #ccc;
      border-radius: 15px;
    }
    .form-group label {
      display: block;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .form-group input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .form-group .btn {
      width: 100%;
      padding: 8px;
      background-color: #4caf50;
      color: #fff;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .form-group .btn:hover {
      background-color: #45a045;
      box-shadow:0 0 5px  rgba(0,0,0,0.6);
    }
    .password-container {
  position: relative;
}

.password-toggle {
  position: absolute;
  top: 50%;
  right: 10px;
  transform: translateY(-50%);
  cursor: pointer;
  color: #666;
}
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
    {% include 'nav.html' %}
  <div class="container " style= "margin-bottom: 160px">
    <h5 class="mb-3 mt-4"style="color:darkblue;">Login to Colltech</h5>
    <!---Form starts here --->
    <form action="/login" method="post">
      <div class="form-group">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
    
         <label for="password">Password:</label>
    <div class="password-container">
        <input type="password" id="password" name="password" required>
      <span class="password-toggle" onclick="togglePasswordVisibility()"><i class="fas fa-eye"></i></span>
    </div>

        <input type="submit" value="Login" class="btn">
      </div>
    </form>
    
    <p class="mt-3 mb-4">Don't have an Account? <a style="text-decoration:none;"href="/signup">Register</a> instead</p> 
  </div>
  {% include 'footer.html' %}
</body>
</html>

<!---JS reveal password Event Listener --->
<script>
  function togglePasswordVisibility() {
  var passwordInput = document.getElementById('password');
  var passwordToggle = document.querySelector('.password-toggle');
  
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    passwordToggle.innerHTML = '<i class="fas fa-eye-slash"></i>';
  } else {
    passwordInput.type = 'password';
    passwordToggle.innerHTML = '<i class="fas fa-eye"></i>';
  }
}
</script>
