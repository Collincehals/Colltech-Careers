    {% include 'nav.html' %}
<div id=space class="container border-bottom " style="padding-bottom:8px; margin-bottom:200px">
  <h1 style="color: rgb(100,50,20)">Apply for Job:</h1>

    <form method="POST" enctype="multipart/form-data">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
        <br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email address" required>
        <br>

        <label for="resume">Resume:</label>
        <input type="file" id="resume" name="resume" required>
        <br>
        <label for="Academic certificates">Academic Certificates:</label>
        <input type="file" id="Academic certificates" name="Academic Certificates"> <br>
    
      <input type="submit" value="Submit">
  </form>
