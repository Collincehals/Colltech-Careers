<!DOCTYPE html>
<html>
  <head>
    <link rel="icon" type="image/png" href="/static/logo1.png" style="border-radius:2000px">
    <title>Job Application</title>
    
    <!---Bootstrap css links Here --->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">

    <!---Form Styling starts Here --->
<style>
  #space {
    margin-bottom: 20px;
  }
  body {
      background-color:(220,220,240);
      }
  input[type=text], select {
  width: 100%;
  padding: 12px 20px;
  margin: 8px 0;
  display: inline-block;
  border: 1px solid #ccc;
  border-radius: 4px;
  box-sizing: border-box;
}
 input[type=email] {
  width: 100%;
  padding: 12px 20px;
  margin: 8px 0;
  display: inline-block;
  border: 1px solid #ccc;
  border-radius: 4px;
  box-sizing: border-box;
}
  input[type=file] {
  width: 100%;
  padding: 12px 20px;
  margin: 8px 0;
  display: inline-block;
  border: 1px solid #ccc;
  border-radius: 4px;
  box-sizing: border-box;
}
input[type=submit] {
  width: 20%;
  background-color:rgb(55,120,225);
  color: white;
  padding: 14px 20px;
  margin: 8px 0;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

input[type=submit]:hover {
  background-color:#45a049;
}

div {
  border-radius: 5px;
  background-color: #f2f2f2;
  padding: 20px;
}
</style>
  </head>
  <body>
    <!---js Script starts here --->
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
   
    {% include 'nav.html' %}

    <!---Form starts Here --->
    
<div id=space class="container border-bottom" style="padding-bottom:8px; margin-bottom:200px">
  
  <h1  style="color: rgb(100,50,20); margin-top: 65px; margin-bottom:15px; font-size: 25px">Apply for Job:{{title}}</h1>
  
<form action="https://colltech-careers--collincehals.repl.co/submit" method="post">
    <label for="fname">First Name</label>
    <input type="text" id="fname" name="firstname" placeholder="Your name.." required>

    <label for="lname">Last Name</label>
    <input type="text" id="lname" name="lastname" placeholder="Your last name.." required>

    <label for="country">Country</label>
    <select id="country" name="country">
      <option value="australia">Kenya</option>
      <option value="uganda">Uganda</option>
      <option value="usa">USA</option>
      <option value="tanzania">Tanzania</option>
      <option value="rwanda">Rwanda</option>
    </select>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <label for="resume">Resume:</label>
        <input type="file" id="resume" name="resume" required>
        <label for="certificate">Certificate:</label>
        <input type="file" id="certificate" name="certificate" required>        
      <input type="submit" value="Submit">
  </form>
 </div>
    <!-- Form input ends here -->

    <!---Footer Link Here --->
    {% include 'footer.html' %}
  </body>
</html>
