<!DOCTYPE html>
<html>
  <head>
    <!---Form Styling starts Here --->
<style>
  input[type=text], select {
  width: 100%;
  padding: 12px 20px;
  margin: 8px 0;
  display: inline-block;
  border: 1px solid #ccc;
  border-radius: 4px;
  box-sizing: border-box;
}
 input[type=email] {
  width: 100%;
  padding: 12px 20px;
  margin: 8px 0;
  display: inline-block;
  border: 1px solid #ccc;
  border-radius: 4px;
  box-sizing: border-box;
}
  input[type=file] {
  width: 100%;
  padding: 12px 20px;
  margin: 8px 0;
  display: inline-block;
  border: 1px solid #ccc;
  border-radius: 4px;
  box-sizing: border-box;
}
input[type=submit] {
  width: 50%;
  background-color:#45a049;
  color: white;
  padding: 14px 20px;
  margin: 8px 0;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

input[type=submit]:hover {
  background-color:#45a049;
}

</style>
  </head>
  <body>
  
  <h1  style="color:rgb(100,50,20); margin-top: 20px; margin-bottom:15px; font-size: 20px; text-align:center">Apply for Job: {{job['title']}}</h1>
  
<form action="https://colltech-careers--collincehals.repl.co/submit" method="post">
    <label for="fname">First Name</label>
    <input type="text" id="fname" name="firstname" placeholder="Your name.." required>

    <label for="lname">Last Name</label>
    <input type="text" id="lname" name="lastname" placeholder="Your last name.." required>

    <label for="country">Country</label>
    <select id="country" name="country">
      <option value="australia">Kenya</option>
      <option value="uganda">Uganda</option>
      <option value="usa">USA</option>
      <option value="tanzania">Tanzania</option>
      <option value="rwanda">Rwanda</option>
    </select>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <label for="resume">Resume:</label>
        <input type="file" id="resume" name="resume" required>
        <label for="certificate">Certificate:</label>
        <input type="file" id="certificate" name="certificate" required>        
      <input type="submit" value="Submit">
  </form>
  </body>
</html>
