<!DOCTYPE html>
<html>
<head>
  <!---FONT AWESOME LINK --->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <title>Sign Up Page</title>
  <link rel="icon" type="image/png" href="/static/COLLTECH.png">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
  <style>
    body {
      
      background-image: url("/static/bg4.jpg");
      background-size: contain;
    }

    .container {
      font-family:Arial, sans-serif;
      max-width: 700px;
      width: 90%;
      padding: 40px;
      padding-top:10px;
      background-color: #f2f2f2;
      margin: 0 auto;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 3px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 10px;
    }
    .form-group select {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid#ccc;
      border-radius: 10px;
    }

    .form-group .btn {
      width: 100%;
      padding: 12px;
      background-color:  #0000FF;
      color: #fff;
      margin-top: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    .form-group .btn:hover {
      background-color:#003296;
      box-shadow:0 0 5px  rgba(0,0,0,0.6);
    }
    .password-container {
  position: relative;
}

.password-toggle {
  position: absolute;
  top: 50%;
  right: 10px;
  transform: translateY(-50%);
  cursor: pointer;
  color: #666;
}
    .confirm-password-toggle {
  position: absolute;
  top: 50%;
  right: 10px;
  transform: translateY(-50%);
  cursor: pointer;
  color: #666;
}
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
    {% include 'nav.html' %}
  <div class="container" style="margin-bottom: 50px">
    <h5 style="margin-top:20px;margin-bottom:20px;color:blue;"><i class="fa-solid fa-user me-2 "></i>Create a free Colltech Account</h5>
    <form action="/signup" method="post">
      
      <div class="form-group">
        <label for="firstname">First Name:</label>
        <input type="text" id="firstname" name="firstname" required>
    
        <label for="lastname">Last Name:</label>
        <input type="text" id="lastname" name="lastname" required>

        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required>

        <label for="gender">Gender</label>
        <select id="gender" name="gender">
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="other">Prefer not to Say</option>
        </select>
        
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
    
        <label for="password">Password:</label>
    <div class="password-container">
        <input type="password" id="password" name="password" required>
      <span class="password-toggle" onclick="togglePasswordVisibility()"><i class="fas fa-eye"></i></span>
    </div>
      <div class="password-container">
        <label for="password">Confirm Password:</label>
        <input type="password" id="confirmpassword" name="password" required><span class="confirm-password-toggle" onclick="toggleConfirmPasswordVisibility()"><i class="fas fa-eye"></i></span>
      </div>

        <input type="submit" value="Sign Up" class="btn">
      </div>
      
  <div class="mt-3">   
  <input class="me-2"type="checkbox"  name="checkbox">
  <label for="checkbox">You accept our Terms and Conditions and Privacy Policy:</label>
  </div>
    </form>
    
    <p class="mt-3 mb-4">Have an Account? <a style="text-decoration:none;"href="/login">Login</a> instead</p> 
  </div>
  {% include 'footer.html' %}
</body>
</html>

<!---JS reveal password Event Listener --->
<script>
  function togglePasswordVisibility() {
  var passwordInput = document.getElementById('password');
  var passwordToggle = document.querySelector('.password-toggle');
  
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    passwordToggle.innerHTML = '<i class="fas fa-eye-slash"></i>';
  } else {
    passwordInput.type = 'password';
    passwordToggle.innerHTML = '<i class="fas fa-eye"></i>';
  }
}

  function toggleConfirmPasswordVisibility() {
  var passwordInput = document.getElementById('confirmpassword');
  var passwordToggle = document.querySelector('.confirm-password-toggle');
  
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    passwordToggle.innerHTML = '<i class="fas fa-eye-slash"></i>';
  } else {
    passwordInput.type = 'password';
    passwordToggle.innerHTML = '<i class="fas fa-eye"></i>';
  }
}
</script>
