<!DOCTYPE html>
<html>
<head>
  <!---FONT AWESOME LINK --->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <title>Sign Up Page</title>
  <link rel="icon" type="image/png" href="/static/logo1.png" style="border-radius:2000px">
    <title>Colltech Careers</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-image: url("/static/bg4.jpg");
      background-size: contain;
    }

    .container {
      width: 300px;
      padding: 20px;
      background-color: #f2f2f2;
      margin: 0 auto;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .form-group label {
      display: block;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .form-group input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 3px;
    }

    .form-group .btn {
      width: 100%;
      padding: 8px;
      background-color: #4caf50;
      color: #fff;
      margin-top: 10px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }

    .form-group .btn:hover {
      background-color: #45a045;
      box-shadow:0 0 5px  rgba(0,0,0,0.6);
    }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
    {% include 'nav.html' %}
  <div class="container" style="margin-bottom: 50px">
    <h3>Sign Up</h3>
    <form action="/signup" method="post">
      
      <div class="form-group">
        <label for="firstname">First Name:</label>
        <input type="text" id="firstname" name="firstname" required>
    
        <label for="lastname">Last Name:</label>
        <input type="text" id="lastname" name="lastname" required>

        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required>
        
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
    
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
      
        <input type="submit" value="Sign Up" class="btn">
      </div>
    </form>
    <p>Have an Account? <a style="text-decoration:none;"href="/login">Login</a> instead</p> 
  </div>
  {% include 'footer.html' %}
</body>
</html>
