<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/png" href="/static/COLLTECH.png">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recruiter Signup page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
  
  <style>
    body{
      background-image: url('/static/bg6.jpg');
      background-repeat: no-repeat;
      background-size:cover;
      font-family: Arial, sans-serif;
      font-size: 16px;
    }
    .container {
      max-width: 700px;
      width: 90%;
      padding:20px;
      margin:0 auto;
      margin-bottom:20px;
      margin-top:40px;
      border-radius: 15px;
      background-color: rgb(240,245,250);   
    }
    
    .form-group label {
      display: block;
      margin-bottom:6px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .form-group input {
      width: 100%;
      border: 1px;
      border-radius: 15px;
      background-color: #f0f0f0;
      padding: 10px;
      margin-bottom: 10px;  
    }

    .form-group select {
      width: 100%;
      border: 1px;
      background-color: #f0f0f0;
      border-radius: 15px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .form-group .btn{
      width: 100%;
      border: 1px;
      background-color: #4caf50;
      border-radius: 15px;
      padding: 10px;
      margin-bottom: 4px; 
    }
    .form-group .btn:hover {
      background-color: #45a045;
      box-shadow:0 0 5px  rgba(0,0,0,0.6);
    }
    
    .password-container {
  position: relative;
    }
  .password-toggle {
    position: absolute;
    top: 50%;
    right: 10px;
    transform: translateY(-50%);
    cursor: pointer;
    color: #666;
  }

  </style>
  
</head>
  <body>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
    {% include 'nav.html' %}
    <div class="container">
    <form>
      <div class="form-group">
        <label for="firstname">First Name: </label>
        <input type="text" name="firstname" placeholder="Jac...">

        <label for="lastname" >Last Name: </label>
        <input type="text" name="lastname" placeholder="Smith...">

        <label for="email">Email Address: </label>
        <input type="email" name="email" placeholder="colltech@careers.com">

        <label for="company_name" >Company Name: </label>
        <input type="text" name="company_name" placeholder="Company...">

         <label for="category">Company Category</label>
        <select name="category">
          <option value="IT_Engineering">IT/Engineering</option>
          <option value="Consultancy_services">Consultancy Services</option>
          <option value="HR_services">HR Services</option>
          <option value="Educational_services">Educational Services</option>
          <option value="fitness">Fitness</option>
        </select>

        <label for="password">Password: </label>
        <div class="password-container">
        <input type="password" id="password" name="password">
          <span class="password-toggle" onclick="togglePasswordVisibility()"><i class="fas fa-eye"></i></span>
        </div>

        <label for="password" >Confirm Password: </label>
        <input type="password" name="password">

        <input type="Submit" value="Sign Up"  class="btn">
      </div>
      <div class="mt-3"> 
        <input class="me-2" type="checkbox" name="checkbox">
        <label>You accept our Terms & Conditions of Service</label>
        </div>
    </form>
      <p class="mt-3 mb-4">Have an Account? <a style="text-decoration:none;"href="/login">Login</a> instead</p> 
  </div>
    </div>
    {% include 'footer.html' %}
  </body>
</html>

<!---JS reveal password Event Listener --->
<script>
  function togglePasswordVisibility() {
  var passwordInput = document.getElementById('password');
  var passwordToggle = document.querySelector('.password-toggle');
  
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    passwordToggle.innerHTML = '<i class="fas fa-eye-slash"></i>';
  } else {
    passwordInput.type = 'password';
    passwordToggle.innerHTML = '<i class="fas fa-eye"></i>';
  }
}
</script>
