<!DOCTYPE html>
<html>
<head>
<style>
  
.container {
  position: relative;
  width: 50%;
}

.image {
  opacity: 1;
  display: block;
  width: 100%;
  height: auto;
  transition: .5s ease;
  backface-visibility: hidden;
}

.middle {
  transition: .5s ease;
  opacity: 0;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  -ms-transform: translate(-50%, -50%)
}

.container:hover .image {
  opacity: 0.3;
}

.container:hover .middle {
  opacity: 1;
}



.desc {
  white-space: nowrap; 
  color: white;
  font-size: 20px;
  position: absolute;
  overflow: hidden;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  -ms-transform: translate(-50%, -50%);
}
</style>
</head>
<body>

<h2>Slide in Overlay from the Top</h2>

<div class="container">
  <img src="/static/Photo01.jpg" alt="Avatar" class="image">
  <div class="overlay">
    <div class="desc">
      <a style="text-decoration: none;" target="_blank" href="https://colltech-careers--collincehals.repl.co/portfolio">Learn more about the services we offer at Colltech Careers </a>
  </div>
</div>
 
</body>
</html>
